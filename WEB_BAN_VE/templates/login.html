{% extends 'base.html' %}

{% block content %}
<style>
    body { padding-bottom: 0 !important; }

    .login-wrapper {
        background: linear-gradient(rgba(3, 4, 94, 0.5), rgba(3, 4, 94, 0.8)), 
                    url("{{ url_for('static', filename='bg-login.png') }}") no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
    }

    .login-card {
        background: rgba(10, 25, 80, 0.85); 
        backdrop-filter: blur(10px);
        width: 100%;
        max-width: 380px; 
        padding: 40px 30px;
        border-radius: 25px;
        border: 1px solid rgba(72, 202, 228, 0.3);
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        z-index: 10;
    }

    .brand-title {
        font-size: 26px;
        font-weight: bold;
        color: white;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 0;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
    }

    .brand-slogan {
        color: #90e0ef; 
        font-size: 14px; 
        margin-top: 8px;
        font-style: italic;
    }

    .input-box {
        width: 100%;
        margin-bottom: 20px;
        text-align: left;
    }

    .input-box label {
        font-size: 11px;
        font-weight: bold;
        color: #48cae4;
        display: block;
        margin-bottom: 8px;
    }

    .input-box input {
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(72, 202, 228, 0.5);
        padding: 15px;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        outline: none;
        box-sizing: border-box;
    }

    .btn-login {
        width: 100%;
        background: #00b4d8; 
        color: #03045e;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-weight: bold;
        font-size: 16px;
        margin-top: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-login:active { transform: scale(0.98); background: #90e0ef; }

    .forgot-pwd {
        display: block;
        margin-top: 20px;
        color: #90e0ef;
        font-size: 13px;
        text-decoration: none;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="brand-header">
            <h1 class="brand-title">VẬN TẢI DUY TIẾN</h1>
            <div class="brand-slogan">Hành trình an toàn - Tận tâm</div>
        </div>

        <!-- THAY ĐỔI TẠI ĐÂY: Thêm thẻ form -->
        <form action="/" method="POST">
            <div class="input-box">
                <label>SỐ ĐIỆN THOẠI</label>
                <!-- Thêm name="username" -->
                <input type="text" name="username" placeholder="Nhập số điện thoại đã đăng kí..." required>
            </div>

            <div class="input-box">
                <label>MẬT KHẨU</label>
                <!-- Thêm name="password" -->
                <input type="password" name="password" placeholder="********" required>
            </div>

            <!-- Thêm type="submit" và xóa bỏ onclick cũ -->
            <button type="submit" class="btn-login">
                VÀO HỆ THỐNG
            </button>
        </form>

        <a href="#" class="forgot-pwd">Quên mật khẩu?</a>
    </div>
</div>
{% endblock %}
