{% extends 'base.html' %}

{% block content %}
<style>
    /* Tổng thể nền xanh đậm sang trọng */
    body { background-color: #f0f2f5; margin: 0; padding: 0; }

    .banner {
        background: linear-gradient(rgba(0, 119, 182, 0.6), rgba(3, 4, 94, 0.8)), 
                    url("{{ url_for('static', filename='bg-seat.png') }}"); 
        background-size: cover; 
        background-position: center;
        padding: 80px 20px 120px 20px; 
        text-align: center;
        border-radius: 0 0 40px 40px;
    }
    
    .main-title { font-size: 32px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; }
    
    .search-box {
        max-width: 500px;
        background: white; 
        margin: -60px auto 40px auto; 
        padding: 30px;
        border-radius: 25px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        color: #03045e;
    }

    .form-field { 
        margin-bottom: 20px; 
        border: 1px solid #e0e0e0; 
        padding: 12px 15px; 
        border-radius: 12px;
        transition: 0.3s;
    }
    
    .form-field:focus-within { border-color: #0077b6; box-shadow: 0 0 8px rgba(0,119,182,0.2); }

    .label { color: #0077b6; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
    
    .value { 
        border: none; 
        width: 100%; 
        font-size: 16px; 
        font-weight: 600; 
        outline: none; 
        background: transparent; 
        color: #333; 
    }

    .btn-search {
        width: 100%; 
        background: linear-gradient(45deg, #0077b6, #03045e);
        color: white; 
        border: none; 
        padding: 18px; 
        border-radius: 15px; 
        font-weight: bold; 
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(3, 4, 94, 0.3);
    }

    .btn-search:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(3, 4, 94, 0.4); }
    .btn-search:active { transform: scale(0.97); }

    .user-welcome {
        color: white;
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.9;
    }
</style>

<div class="banner">
    <h1 class="main-title">VẬN TẢI DUY TIẾN</h1>
    <p class="user-welcome">Chào mừng khách hàng: <b>{{ session['user_name'] }}</b></p>
    <p style="color: #90e0ef; font-size: 13px;">UY TÍN TẠO NÊN THƯƠNG HIỆU</p>
</div>

<div class="search-box">
    <!-- Chọn Điểm đi -->
    <div class="form-field">
        <div class="label"><i class="fas fa-map-marker-alt"></i> ĐIỂM ĐI</div>
        <select class="value" id="departure" onchange="filterDestination()">
            <option value="Nghệ An">Nghệ An (Bến xe Vinh)</option>
            <option value="Thanh Hóa">Thanh Hóa (Bến xe phía Tây)</option>
            <option value="Ninh Bình">Ninh Bình (Bến xe Ninh Bình)</option>
            <option value="Hà Nội">Hà Nội (Bến xe Nước Ngầm)</option>
        </select>
    </div>

    <!-- Chọn Điểm đến -->
    <div class="form-field">
        <div class="label"><i class="fas fa-map-marked-alt"></i> ĐIỂM ĐẾN</div>
        <select class="value" id="destination">
            <option value="Hà Nội">Hà Nội (Bến xe Nước Ngầm)</option>
            <option value="Ninh Bình">Ninh Bình (Bến xe Ninh Bình)</option>
            <option value="Thanh Hóa">Thanh Hóa (Bến xe phía Tây)</option>
            <option value="Nghệ An">Nghệ An (Bến xe Vinh)</option>
        </select>
    </div>

    <!-- Chọn Ngày đi -->
    <div class="form-field">
        <div class="label"><i class="fas fa-calendar-day"></i> NGÀY ĐI</div>
        <input type="date" id="travel_date" class="value">
    </div>
    
    <!-- Nút Tìm chuyến -->
    <button onclick="handleSearch()" class="btn-search">TÌM CHUYẾN XE</button>
    
    <div class="text-center mt-3">
        <a href="{{ url_for('logout') }}" style="text-decoration: none; color: #888; font-size: 13px;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất tài khoản
        </a>
    </div>
</div>

<script>
    // Thiết lập ngày mặc định khi tải trang
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('travel_date');
        dateInput.value = today;
        dateInput.min = today; // Không cho phép chọn ngày quá khứ
        filterDestination();
    });

    // Hàm xử lý không cho chọn điểm đi trùng điểm đến
    function filterDestination() {
        const departure = document.getElementById('departure');
        const destination = document.getElementById('destination');
        const selectedDep = departure.value;
        
        for (let i = 0; i < destination.options.length; i++) {
            const option = destination.options[i];
            if (option.value === selectedDep) {
                option.disabled = true;
                if (destination.value === selectedDep) {
                    destination.selectedIndex = (i + 1) % destination.options.length;
                }
            } else {
                option.disabled = false;
            }
        }
    }

    // Hàm xử lý khi nhấn tìm kiếm
    function handleSearch() {
        const departure = document.getElementById('departure').value;
        const destination = document.getElementById('destination').value;
        const travelDate = document.getElementById('travel_date').value;

        if (!travelDate) {
            alert("Vui lòng chọn ngày đi!");
            return;
        }

        // Lưu thông tin vào localStorage để trang sau sử dụng
        localStorage.setItem('diem_di', departure);
        localStorage.setItem('diem_den', destination);
        localStorage.setItem('ngay_di', travelDate);
        
        // Chuyển hướng sang trang chọn giờ (đảm bảo bạn đã có route /pick-time trong app.py)
        window.location.href = "/pick-time";
    }
</script>
{% endblock %}
