{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="glass-card">
        <h2 class="text-center mb-4"><i class="fas fa-user-plus" style="color: var(--primary);"></i> Tạo Tài Khoản</h2>
        
        <form method="POST" action="">
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" name="hoten" class="form-control" placeholder="Ví dụ: Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Số điện thoại liên lạc</label>
                <input type="text" name="sdt" class="form-control" placeholder="Ví dụ: 0912345678" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu bảo mật</label>
                <input type="password" name="password" class="form-control" placeholder="Mật khẩu của bạn" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem; background-color: var(--primary);">ĐĂNG KÝ VÀ TIẾP TỤC <i class="fas fa-arrow-right"></i></button>
        </form>

        <div class="text-center" style="margin-top: 1.5rem; border-top: 1px dashed var(--border); padding-top: 1.5rem;">
            <span style="color: var(--text-muted);">Đã có tài khoản trước đây?</span> <br>
            <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: bold; text-decoration: none; display: inline-block; margin-top: 5px;"> Đăng Nhập Lại Tại Đây</a>
        </div>
    </div>
</div>
{% endblock %}
