{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="glass-card">
        <h2 class="text-center mb-4"><i class="fas fa-lock" style="color: var(--primary);"></i> Đăng Nhập</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" name="username" class="form-control" placeholder="..." required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="..." required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">ĐĂNG NHẬP <i
                    class="fas fa-arrow-right"></i></button>
        </form>

        <div class="text-center" style="margin-top: 1.5rem; border-top: 1px dashed var(--border); padding-top: 1.5rem;">
            <span style="color: var(--text-muted);">Bạn chưa có thẻ lên xe?</span> <br>
            <a href="{{ url_for('register') }}"
                style="color: var(--primary); font-weight: bold; text-decoration: none; display: inline-block; margin-top: 5px;">Tạo
                Tài Khoản Mới Ngay</a>
        </div>
    </div>
</div>
{% endblock %}
